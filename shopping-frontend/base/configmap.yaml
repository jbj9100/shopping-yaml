apiVersion: v1
kind: ConfigMap
metadata:
  name: shopping-nginx-config
  namespace: shopping-dev-frontend
data:
  nginx.conf: |
    load_module modules/ngx_otel_module.so;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
    
      otel_exporter {
        endpoint otel-collector-collector.otel.svc.cluster.local:4317;
      }

      otel_service_name shopping-dev-frontend-nginx;
      otel_resource_attr deployment.environment dev;
      otel_resource_attr service.namespace shopping-dev-frontend;

      # DNS resolver (Kubernetes CoreDNS)
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;

      # Ingress가 준 X-Forwarded-Proto/Host가 있으면 우선 사용, 없으면 로컬 값 사용
      map $http_x_forwarded_proto $real_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
      }

      map $http_x_forwarded_host $real_host {
        default $http_x_forwarded_host;
        ""      $http_host;
      }

      server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA 라우팅
        location / {
          try_files $uri $uri/ /index.html;
        }

        # API 프록시 (요청 그대로 전달: /api/* -> backend의 /api/*)
        location /api/ {
          otel_trace on;
          otel_trace_context propagate;
          otel_span_name "nginx /api";
          otel_span_attr proxy.target "shopping-dev-backend";

          set $backend shopping-dev-backend-service.shopping-dev-backend.svc.cluster.local;

          proxy_pass http://$backend:8000;
          proxy_http_version 1.1;
          # ✅ 리다이렉트는 억지로 rewrite하지 않고, 백엔드가 올바른 URL 만들게 헤더로 해결
          proxy_redirect off;

          proxy_set_header Host              $real_host;
          proxy_set_header X-Forwarded-Host  $real_host;
          proxy_set_header X-Forwarded-Proto $real_proto;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # WebSocket 프록시
        location /websocket/ {
          otel_trace on;
          otel_trace_context propagate;
          otel_span_name "nginx /websocket";
          otel_span_attr proxy.target "shopping-dev-websocket";

          set $websocket shopping-dev-websocket-service.shopping-dev-websocket.svc.cluster.local;

          proxy_pass http://$websocket:8001;
          proxy_http_version 1.1;

          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          proxy_set_header Host              $real_host;
          proxy_set_header X-Forwarded-Host  $real_host;
          proxy_set_header X-Forwarded-Proto $real_proto;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # MinIO 이미지 프록시
        location /minio/ {
          otel_trace on;
          otel_trace_context propagate;
          otel_span_name "nginx /minio";
          otel_span_attr proxy.target "minio";

          set $minio minio.minio.svc.cluster.local;

          # /minio/category/food.jpeg → MinIO의 /category/food.jpeg
          rewrite ^/minio/(.*)$ /$1 break;
          proxy_http_version 1.1;
          proxy_pass http://$minio:9000;

          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

          # 캐싱 헤더 설정 (브라우저 캐싱 활용)
          add_header Cache-Control "public, max-age=31536000, immutable";
        }
      }
    }
