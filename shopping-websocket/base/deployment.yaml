apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-dev-websocket
  namespace: shopping-dev-websocket
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: shopping-dev-websocket
  template:
    metadata:
      labels:
        app: shopping-dev-websocket
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"        
    spec:
      containers:
      - name: shopping-dev-websocket
        image: registry.example.com/shopping-dev-websocket/websocket:v1
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: shopping-dev-websocket-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5            