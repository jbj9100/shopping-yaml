apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod-backend

# Base 참조
bases:
  - ../../base

# 리소스 이름 접두사
namePrefix: prod-

# 이미지 설정
images:
  - name: shopping-backend
    newName: 192.168.80.90:5000/shopping-prod-backend
    newTag: v1.0.0  # Jenkins가 이 태그를 업데이트

# ConfigMap 패치 (Prod 환경별 설정)
patchesStrategicMerge:
  - configmap-patch.yaml

# Replica 설정 (Prod는 3개)
replicas:
  - name: prod-backend
    count: 3
