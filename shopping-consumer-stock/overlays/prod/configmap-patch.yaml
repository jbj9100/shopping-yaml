apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  # Database (Prod 환경 - 운영 DB)
  DATABASE_CONN: "postgresql+asyncpg://postgres:PRODUCTION_PASSWORD@prod-postgresql.prod-db.svc.cluster.local:5432/shopping_prod"
  
  # Redis (Prod 환경)
  REDIS_URL: "redis://:PRODUCTION_PASSWORD@redis-master.prod-redis.svc.cluster.local:6379/0"
  
  # CORS (Prod 환경 - 실제 도메인)
  CORS_ORIGINS: "https://shopping.example.com"

  # JWT Secret (Prod - 강력한 키, 실제로는 Secret 사용 권장)
  JWT_SECRET_KEY: "CHANGE-THIS-TO-STRONG-RANDOM-STRING-AT-LEAST-32-CHARACTERS-LONG-FOR-PRODUCTION"
  
  # Cookie Security (Prod - HTTPS 필수)
  REFRESH_COOKIE_SECURE: "true"
  
  # Admin (Prod - 실제 관리자 계정)
  ADMIN_EMAIL: "prodadmin@example.com"
  ADMIN_USERNAME: "prodadmin"
  ADMIN_PASSWORD: "CHANGE-THIS-STRONG-PASSWORD"
  ADMIN_ROLE: "admin"
  
  # Logging (Prod - WARNING 레벨)
  LOG_LEVEL: "WARNING"
